<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core">
    <h:head>
        <title>Pagina principal</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous"/>
        <!-- JavaScript Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>

    </h:head>
    <h:body class="contenedor">
        <h:outputStylesheet library="css" name="styles.css"/>

        <div class="contenedor">
            <h:form>
                <p:growl id="messages"/>

                <p:menubar>
                    <p:menuitem class="negrita" value="AlphaLabs" />
                    <p:divider layout="vertical"/>
                    <p:menuitem value="Inicio" icon="pi pi-fw pi-user"/>

                    <p:menuitem value="Informacion" icon="pi pi-fw pi-calendar"/>

                    <p:menuitem value="contacto" icon="pi pi-fw pi-calendar-plus"/>

                    <p:divider layout="vertical"/>
                    
                    <f:facet name="options">
                        <h:commandLink value="#{iniciarsesion.jsp}" action="iniciarsesion.jsp">                            
                            <p:button value="Iniciar Sesión" icon="pi pi-user"/>   
                        </h:commandLink>
                    </f:facet>

                </p:menubar>
            </h:form>
        </div> 

    </h:body>
</html>
