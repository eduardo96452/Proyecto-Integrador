<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core">
    <h:head>
        <title>Pagina principal</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous"/>
        <!-- JavaScript Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>

    </h:head>
    <h:body>
        <h:outputStylesheet library="css" name="styles.css"/>

        <div class="card">
            <h:form>
                <p:growl id="messages"/>

                <p:menubar>

                    <p:submenu label="Usuarios" icon="pi pi-fw pi-user">
                        <p:menuitem value="Crear Usuario" icon="pi pi-fw pi-user-plus"/>
                        <p:menuitem value="Borrar Usuario" icon="pi pi-fw pi-user-minus"/>
                        <p:submenu label="Buscar usuario" icon="pi pi-fw pi-users">
                            <p:menuitem value="Lista de usuarios" icon="pi pi-fw pi-bars"/>
                        </p:submenu>
                    </p:submenu>

                    <p:submenu label="Examenes" icon="pi pi-fw pi-file">
                        <p:menuitem value="Crear Examen" icon="pi pi-fw pi-plus"/>
                        <p:menuitem value="Actualizar Examen" icon="pi pi-pencil"/>
                        <p:menuitem value="Borrar Examen" icon="pi pi-fw pi-trash"/>                        
                    </p:submenu>

                    <p:submenu label="Events" icon="pi pi-fw pi-calendar">
                        <p:submenu label="Edit" icon="pi pi-fw pi-pencil">
                            <p:menuitem value="Save" icon="pi pi-fw pi-calendar-plus"/>
                            <p:menuitem value="Delete" icon="pi pi-fw pi-calendar-minus"/>
                        </p:submenu>
                        <p:submenu label="Archieve" icon="pi pi-fw pi-calendar-times">
                            <p:menuitem value="Remove" icon="pi pi-fw pi-calendar-minus"/>
                        </p:submenu>
                    </p:submenu>

                    <p:divider layout="vertical"/>

                    <p:submenu label="nombre" icon="pi pi-user">
                        <p:menuitem value="Perfil" icon="pi pi-user-edit"/>
                    </p:submenu>

                    <f:facet name="options">                        
                        <h:commandLink value="#{iniciarsesion.jsp}" action="iniciarsesion.jsp">                            
                            <p:button value="Cerrar Sesión" icon="pi pi-fw pi-sign-out" styleClass="ui-button-info"/>
                        </h:commandLink>

                    </f:facet>
                </p:menubar>
            </h:form>
        </div>
        <h:form id="form">
            <p:growl id="msgs" showDetail="true"/>

            <div class="card">
                <h5>Row Editing</h5>
                <p:dataTable id="products1" var="product" value="#{dtEditView.products1}" editable="true"
                             style="margin-bottom:20px">

                    <p:ajax event="rowEdit" listener="#{dtEditView.onRowEdit}" update=":form:msgs"/>
                    <p:ajax event="rowEditCancel" listener="#{dtEditView.onRowCancel}" update=":form:msgs"/>

                    <p:column headerText="Code">
                        <p:cellEditor>
                            <f:facet name="output">
                                <h:outputText value="#{product.code}"/>
                            </f:facet>
                            <f:facet name="input">
                                <p:inputText id="modelInput" value="#{product.code}" style="width:100%"/>
                            </f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Name">
                        <p:cellEditor>
                            <f:facet name="output">
                                <h:outputText value="#{product.name}"/>
                            </f:facet>
                            <f:facet name="input">
                                <p:inputText value="#{product.name}" style="width:100%" label="Name"/>
                            </f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Status">
                        <p:cellEditor>
                            <f:facet name="output"><h:outputText value="#{product.inventoryStatus}"/></f:facet>
                            <f:facet name="input">
                                <h:selectOneMenu value="#{product.inventoryStatus}" style="width:100%">
                                    <f:selectItems value="#{dtEditView.inventoryStatusList}" var="status"
                                                   itemLabel="#{status.text}" itemValue="#{status}"/>
                                </h:selectOneMenu>
                            </f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Price">
                        <p:cellEditor>
                            <f:facet name="output">
                                <h:outputText value="#{product.price}">
                                    <f:convertNumber type="currency" currencySymbol="$"/>
                                </h:outputText>
                            </f:facet>
                            <f:facet name="input">
                                <p:inputNumber value="#{product.price}" style="width:100%" label="Price" symbol="$"/>
                            </f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column style="width:6rem">
                        <p:rowEditor editTitle="Edit Row" cancelTitle="Cancel Edit" saveTitle="Save Row"/>
                    </p:column>
                </p:dataTable>
                <p:contextMenu for="products2" widgetVar="cMenu">
                    <p:menuitem value="Edit Cell" icon="pi pi-search"
                                onclick="PF('cellProducts').showCellEditor();return false;"/>
                    <p:menuitem value="Hide Menu" icon="pi pi-times" onclick="PF('cMenu').hide()"/>
                </p:contextMenu>
            </div>
        </h:form>
    </h:body>
</html>
